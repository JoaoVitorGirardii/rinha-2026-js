services:
  api1:
    image: joaovitorgirardiii/rinha-2026-js:latest
    environment:
      PORT: 3000
      TREE_MODEL_PATH: /app/model-tree.json
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "108MB"

  api2:
    image: joaovitorgirardiii/rinha-2026-js:latest
    environment:
      PORT: 3000
      TREE_MODEL_PATH: /app/model-tree.json
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "108MB"

  api3:
    image: joaovitorgirardiii/rinha-2026-js:latest
    environment:
      PORT: 3000
      TREE_MODEL_PATH: /app/model-tree.json
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "108MB"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
      - api3
    restart: on-failure
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "26MB"

networks:
  rinha:
    driver: bridge
